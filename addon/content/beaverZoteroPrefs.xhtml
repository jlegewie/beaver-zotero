<vbox id="beaver-zotero-prefpane" xmlns:html="http://www.w3.org/1999/xhtml">
    <groupbox>
        <!-- <label><html:h2>Beaver Preferences</html:h2></label> -->
        <html:p style="margin: 8px 0 16px 0; font-size: 13px">
            Click the button below to open the Beaver sidebar.
            Beaver preferences are available from within the sidebar.
        </html:p>
        <hbox>
        <button id="beaver-open-prefs-btn"
                label="Open Beaver"
                oncommand="
                    var mainWin = Zotero.getMainWindow();
                    mainWin.focus();
                    var eventBus = mainWin.__beaverEventBus;
                    if (eventBus) {
                        eventBus.dispatchEvent(
                            new mainWin.CustomEvent('toggleChat', {
                                detail: { forceOpen: true }
                            })
                        );
                    }
                " />
        </hbox>
    </groupbox>
</vbox>
